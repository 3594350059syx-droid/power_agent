version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: power_agent_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: power_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: power_agent_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d power_agent"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data: